<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A local LLM chatbot with adversarial guardrails, multi-turn history, and Markdown rendering" />
  <title>Local LLM Chatbot</title>
  <link rel="stylesheet" href="style.css" />
  <!-- CDN scripts: pinned versions, defer = load in order after parse -->
  <script defer src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar" role="list" aria-label="Chat sessions">
      <div class="sidebar-header">
        <button class="new-chat-btn" id="newChatBtn" type="button" aria-label="New chat">+ New Chat</button>
        <button class="sidebar-close" id="sidebarClose" type="button" aria-label="Close sidebar">&times;</button>
      </div>
      <div class="sidebar-search hidden" id="sidebarSearchWrap">
        <input type="search" id="sidebarSearch" placeholder="Search chats&hellip;" aria-label="Search chats" />
      </div>
      <div class="sidebar-error hidden" id="sidebarError">
        <p>Could not load sessions</p>
        <button id="sidebarRetry" type="button">Retry</button>
      </div>
      <ul class="session-list" id="sessionList"></ul>
    </aside>

    <!-- Main chat area -->
    <div class="chat">
      <div class="header">
        <button class="hamburger" id="hamburger" type="button" aria-label="Open sidebar">&#9776;</button>
        <div class="header-left">
          <div class="header-avatar">&#129302;</div>
          <div>
            <h1>Local LLM Chat</h1>
            <p>Powered by liquid/lfm2.5-1.2b</p>
          </div>
        </div>
        <div class="header-actions">
          <button class="header-btn hidden" id="exportBtn" type="button" aria-label="Export conversation" title="Export as Markdown">&darr;</button>
          <button class="header-btn" id="sidebarSearchBtn" type="button" aria-label="Search chats" title="Search chats">&#128269;</button>
          <button class="header-btn" id="settingsBtn" type="button" aria-label="Settings" title="Settings">&#9881;&#65039;</button>
        </div>
      </div>

      <div class="settings-panel" id="settingsPanel">
        <label for="presetSelect">Persona preset</label>
        <select id="presetSelect" class="preset-select">
          <option value="">Custom&hellip;</option>
        </select>
        <label for="modelSelect" class="mt-8">Model</label>
        <select id="modelSelect" class="preset-select"></select>
        <label for="systemPrompt" class="mt-8">System Prompt</label>
        <textarea id="systemPrompt" rows="3">You are a helpful assistant.</textarea>
        <details class="settings-advanced">
          <summary>Generation parameters</summary>
          <label class="param-row">
            <span>Temperature</span>
            <input type="range" id="temperature" min="0" max="2" step="0.05" value="0.7" />
            <output id="temperatureVal">0.7</output>
          </label>
          <label class="param-row">
            <span>Top-p</span>
            <input type="range" id="topP" min="0" max="1" step="0.05" value="0.95" />
            <output id="topPVal">0.95</output>
          </label>
          <label class="param-row">
            <span>Top-k</span>
            <input type="range" id="topK" min="0" max="100" step="1" value="40" />
            <output id="topKVal">40</output>
          </label>
          <label class="param-row">
            <span>Max tokens</span>
            <input type="number" id="maxTokens" min="1" max="32768" step="1" value="0" />
          </label>
          <label class="param-row">
            <span>Stream</span>
            <input type="checkbox" id="streamToggle" checked />
          </label>
        </details>
      </div>

      <div class="welcome" id="welcome">
        <div class="welcome-icon">&#128172;</div>
        <h2>Start a Conversation</h2>
        <p>Ask anything &mdash; the model is running locally on your machine. Try one of these to begin:</p>
        <div class="quick-prompts" id="quickPrompts">
          <button class="chip" data-prompt="What is the meaning of life? Answer in one sentence.">Meaning of life</button>
          <button class="chip" data-prompt="Write a Python function that returns the Fibonacci sequence up to n.">Fibonacci in Python</button>
          <button class="chip" data-prompt="Explain how a Content Security Policy works in 3 short bullet points.">How CSP works</button>
          <button class="chip" data-prompt="Tell me a short joke about programming.">Programming joke</button>
          <button class="chip" data-prompt="What are the tradeoffs between SQL and NoSQL databases?">SQL vs NoSQL</button>
          <button class="chip" data-prompt="Write a haiku about debugging.">Haiku about debugging</button>
        </div>
      </div>

      <div class="messages hidden" id="messages"></div>

      <div class="input-bar">
        <div class="input-wrap">
          <textarea id="userInput" placeholder="Type a message&hellip;" rows="1" maxlength="2000"></textarea>
          <span class="char-counter" id="charCounter">0 / 2000</span>
        </div>
        <button class="send-btn" id="sendBtn" type="button" aria-label="Send message">&#10148;</button>
        <button class="stop-btn hidden" id="stopBtn" type="button" aria-label="Stop generation">&#9632;</button>
      </div>
    </div>
  </div>
</body>
</html>
