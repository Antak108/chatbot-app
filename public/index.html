<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A simple chatbot powered by a locally running LLM" />
  <title>Local LLM Chatbot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="header-avatar">🤖</div>
        <div>
          <h1>Local LLM Chat</h1>
          <p>Powered by liquid/lfm2.5-1.2b</p>
        </div>
      </div>
      <button class="settings-toggle" id="settingsBtn" title="System prompt settings">⚙️</button>
    </div>

    <!-- Collapsible Settings -->
    <div class="settings-panel" id="settingsPanel">
      <label for="systemPrompt">System Prompt</label>
      <textarea id="systemPrompt">You answer only in rhymes.</textarea>
    </div>

    <!-- Welcome State -->
    <div class="welcome" id="welcome">
      <div class="welcome-icon">💬</div>
      <h2>Start a Conversation</h2>
      <p>Ask anything — the model is running locally on your machine. Adjust the system prompt above to change its personality.</p>
    </div>

    <!-- Chat Messages -->
    <div class="messages" id="messages" style="display: none;"></div>

    <!-- Input Bar -->
    <div class="input-bar">
      <textarea
        id="userInput"
        placeholder="Type a message…"
        rows="1"
      ></textarea>
      <button class="send-btn" id="sendBtn" title="Send">➤</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
